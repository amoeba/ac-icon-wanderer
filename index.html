<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AC Icon Wanderer</title>
    <meta
      name="description"
      content="Wander through Asheron's Call game icons by visual similarity using vector embeddings."
    />
    <link rel="canonical" href="https://wander.treestats.net" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AC Icon Wanderer" />
    <meta property="og:url" content="https://wander.treestats.net" />
    <meta property="og:title" content="AC Icon Wanderer" />
    <meta
      property="og:description"
      content="Wander through Asheron's Call game icons by visual similarity using vector embeddings."
    />
    <meta property="og:image" content="https://wander.treestats.net/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AC Icon Wanderer" />
    <meta
      name="twitter:description"
      content="Wander through Asheron's Call game icons by visual similarity using vector embeddings."
    />
    <meta name="twitter:image" content="https://wander.treestats.net/og-image.png" />
    <link rel="stylesheet" href="/styles.css" />
    <script type="module" src="/main.js"></script>
  </head>
  <body>
    <div id="grid" class="grid"></div>
    <section
      id="icon-history"
      class="icon-history"
      aria-label="Recently selected icons"
    >
      <div id="icon-history-strip" class="icon-history-strip" role="list"></div>
    </section>
    <div class="details">
      <div id="status" class="status" aria-live="polite"></div>
    </div>
    <div id="icon-tooltip" class="icon-tooltip" role="tooltip" hidden>
      <div id="icon-tooltip-hex" class="icon-tooltip-hex"></div>
      <div id="icon-tooltip-name" class="icon-tooltip-name"></div>
    </div>
    <footer>
      <div class="controls">
        <label for="model-select">model:</label>
        <select id="model-select"></select>
      </div>
      <div>
        <a href="https://github.com/amoeba/ac-icon-wanderer">source code</a>
      </div>
      <div>
        <a href="https://treestats.net">treestats.net</a>
      </div>
    </footer>
  </body>
</html>
